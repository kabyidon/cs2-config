// Gameplay binds 
bind                                        "mwheelup"      "+jump"             // Unbinds quickswitch for mwheelup
bind                                        "mwheeldown"    "+jump"             // Binds mwheeldown to jump 
alias                                       "+knife"        "slot3"
alias                                       "-knife"        "lastinv"
bind                                        "q"             "+knife"            // Quickswitch
bind                                        "4"             "slot4"             // Cycle grenades
bind                                        "x"             "slot7;slot9"       // Flashbang/Decoy
bind                                        "c"             "slot8"             // Smokegrenade
bind                                        "b"             "slot6"             // Hegrenade
bind                                        "v"             "slot10"            // Molotov/Incgrenade
bind                                        "h"             "slot12"            // Healthshot 
bind                                        "j"             "buymenu"           // For Valve DM
bind                                        "mouse4"        "+voicerecord"      // Mic 
bind                                        "capslock"      "toggle voice_modenable" // Toggle teammate voice chatter
bind                                        "mouse5"        "player_ping"       // Player ping
cl_hud_telemetry_ping_show                  "2"                                 // Show telemetry at all times

// Say binds 
bind                                        "]"             "radio1"            // Radio 1
bind                                        "u"             "messagemode2"      // Team chat
alias                                       "bind6"         "bind6_1"
alias                                       "bind6_1"       "say She wasnt a classic nerdy computer kid, she was one of the ones to get a boyfriend first and a very social person.; alias bind6 bind6_2"
alias                                       "bind6_2"       "say Typical for misa: ist egal obs jetzt beim laufen ist oder beim eislaufen oder beim computer sie gibt nicht auf; alias bind6 bind6_3"
alias                                       "bind6_3"       "say What she really wants is to become streamer its her dream and therefore its also my dream for her to get that; alias bind6 bind6_4"
alias                                       "bind6_4"       "say won't make it into the top20 list this year, maybe because hltv is starting to distinguish between real stats and fake exit frags/baiting stats. sad.; alias bind6 bind6_1"
bind                                        "6"             "bind6"             // Joke message cycle
bind                                        "7"             "say Thanks! *kisses your cock*"
bind                                        "8"             "say 〳 ◉ ͜ʖ ◉ 〵 ｄｏｎ＇ｔ ｔａｌｋｉｎｇ ｐｌｅａｓｅ ╰(˵ヘωヘ✿)"
bind                                        "9"             "say しってるよ。君のこと。僕らはみんなともだち。⌒∇⌒"
bind                                        "f1"            "vote option1"
bind                                        "f2"            "vote option2"

// Practice binds 
alias                                       "catjumppos"    "setpos_exact -1193.505737 -973.968994 -167.968750;setang_exact 0.000000 81.941528 0.000000"
alias                                       "startnp"       "exec practice"
alias                                       "givenades"     "give weapon_hegrenade; give weapon_flashbang; give weapon_smokegrenade; give weapon_molotov; say_team AUTOEXEC: Nades given"
// alias                                    "endnp"         "sv_cheats 0; sv_infinite_ammo 0; sv_showimpacts 0; ammo_grenade_limit_total 4; mp_roundtime 2; mp_roundtime_defuse 2; mp_roundtime_hostage 2; sv_grenade_trajectory 0; sv_grenade_trajectory_time 20; cl_grenadepreview 0; mp_restartgame 1; say "AUTOEXEC: Practice mode off"" 

bind                                        "t"             "catjumppos"        // Reset position to where window to cat jump starts on de_mirage
bind                                        "/"             "cl_grenadepreview 1; sv_rethrow_last_grenade" // Rethrow grenade / preview
bind                                        "l"             "toggle host_timescale 10 1" // Timescale
bind                                        "f3"            "startnp"           // Start nade practice mode
bind                                        "f4"            "givenades"         // Give all nades
bind                                        "f9"            "exec 1v1"          // Execute 1v1 config

// Demo playback binds 
alias                                       "+fw"           "demo_timescale 3"
alias                                       "-fw"           "demo_timescale 1"
alias                                       "+fw2"          "demo_timescale 10"
alias                                       "-fw2"          "demo_timescale 1"
alias                                       "d"             "disconnect"        // Type d in console to disconnect
alias                                       "hud_on"        "cl_draw_only_deathnotices 1; demoui; alias hud_toggle hud_off"
alias                                       "hud_off"       "cl_draw_only_deathnotices 0; alias hud_toggle hud_on"
alias                                       "hud_toggle"    "hud_on"

bind                                        "f5"            "+fw"               // Forward the demo at 3x speed
bind                                        "f6"            "+fw2"              // Forward the demo at 10x speed
bind                                        "f7"            "demo_togglepause"  // Toggle pause while watching a demo
bind                                        "f11"           "hud_toggle"        // Toggle HUD on/off

